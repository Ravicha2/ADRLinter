services:
  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - LANGEXTRACT_MODEL_ID=${LANGEXTRACT_MODEL_ID:-google/gemini-3.1-flash-lite-preview}
      - LANGEXTRACT_MODEL_URL=${LANGEXTRACT_MODEL_URL:-https://openrouter.ai/api/v1}
      - LANGEXTRACT_JUDGE_MODEL_ID=${LANGEXTRACT_JUDGE_MODEL_ID:-google/gemma-4-26b-a4b-it:free}
      - LANGEXTRACT_PROVIDER=${LANGEXTRACT_PROVIDER:-openai}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - ./app:/app
    depends_on:
      - neo4j

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_server_memory_heap_initial__size=${NEO4J_HEAP_INITIAL:-256m}
      - NEO4J_server_memory_heap_max__size=${NEO4J_HEAP_MAX:-2048m}
      - NEO4J_server_memory_pagecache_size=${NEO4J_PAGECACHE:-512m}
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:
